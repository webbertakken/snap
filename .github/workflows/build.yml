name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: Linux ARM
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macOS ARM
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev libpipewire-0.3-dev libclang-dev libxcb1-dev libxrandr-dev libdbus-1-dev libwayland-dev libegl-dev libgbm-dev

      - uses: swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
